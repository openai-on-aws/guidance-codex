AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Codex on Bedrock — CloudWatch dashboard. Each widget is a native PromQL chart
  widget that queries the CloudWatch OTLP Prometheus-compatible API. The four
  Overview scorecards show rolling 24-hour totals via sum_over_time(...[1d]).

Parameters:
  DashboardName:
    Type: String
    Default: CodexOnBedrock
    Description: Name of the CloudWatch dashboard.

  MetricsRegion:
    Type: String
    Default: us-east-1
    Description: Region where OTLP metrics are ingested (sidecar sigv4auth region).

Resources:
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {"type":"text","x":0,"y":0,"width":24,"height":1,"properties":{"markdown":"# Overview — rolling 24h totals"}},
            {
              "type":"chart","x":0,"y":1,"width":6,"height":3,
              "properties":{
                "title":"Total Tokens","region":"${MetricsRegion}","view":"number",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"sum(histogram_sum(sum_over_time({\"codex.turn.token_usage\", \"@instrumentation.@name\"=\"codex\"}[1d])))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":false},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":false,"stacked":false,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },
            {
              "type":"chart","x":6,"y":1,"width":6,"height":3,
              "properties":{
                "title":"Active Users","region":"${MetricsRegion}","view":"number",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"count(group by (\"user.id\")(count_over_time({\"codex.turn.token_usage\", \"@instrumentation.@name\"=\"codex\"}[1d])))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":false},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":false,"stacked":false,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },
            {
              "type":"chart","x":12,"y":1,"width":6,"height":3,
              "properties":{
                "title":"Total Turns","region":"${MetricsRegion}","view":"number",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"sum(sum_over_time({\"codex.conversation.turn.count\", \"@instrumentation.@name\"=\"codex\"}[1d]))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":false},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":false,"stacked":false,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },
            {
              "type":"chart","x":18,"y":1,"width":6,"height":3,
              "properties":{
                "title":"API Requests","region":"${MetricsRegion}","view":"number",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"sum(sum_over_time({\"codex.api_request\", \"@instrumentation.@name\"=\"codex\"}[1d]))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":false},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":false,"stacked":false,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },
            {"type":"text","x":0,"y":4,"width":24,"height":1,"properties":{"markdown":"# Token Usage"}},
            {
              "type":"chart","x":0,"y":5,"width":12,"height":6,
              "properties":{
                "title":"Tokens by type","region":"${MetricsRegion}","view":"line",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"sum by (token_type)(histogram_sum({\"codex.turn.token_usage\", \"@instrumentation.@name\"=\"codex\"}))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":true},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":true,"stacked":true,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },
            {
              "type":"chart","x":12,"y":5,"width":12,"height":6,
              "properties":{
                "title":"Tokens by model","region":"${MetricsRegion}","view":"line",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"topk(10, sum by (model)(histogram_sum({\"codex.turn.token_usage\", \"@instrumentation.@name\"=\"codex\"})))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":true},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":true,"stacked":true,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },

            {"type":"text","x":0,"y":11,"width":24,"height":1,"properties":{"markdown":"# Per-User Attribution"}},
            {
              "type":"chart","x":0,"y":12,"width":12,"height":6,
              "properties":{
                "title":"Top users by tokens","region":"${MetricsRegion}","view":"line",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"topk(25, sum by (\"user.id\")(histogram_sum({\"codex.turn.token_usage\", \"@instrumentation.@name\"=\"codex\"})))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":true},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":false,"stacked":false,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },
            {
              "type":"chart","x":12,"y":12,"width":12,"height":6,
              "properties":{
                "title":"Top users by API requests","region":"${MetricsRegion}","view":"line",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"topk(25, sum by (\"user.id\")({\"codex.api_request\", \"@instrumentation.@name\"=\"codex\"}))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":true},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":false,"stacked":false,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },

            {"type":"text","x":0,"y":18,"width":24,"height":1,"properties":{"markdown":"# Activity"}},
            {
              "type":"chart","x":0,"y":19,"width":12,"height":6,
              "properties":{
                "title":"Top users by tool calls","region":"${MetricsRegion}","view":"line",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"topk(25, sum by (\"user.id\")(histogram_count({\"codex.turn.tool.call\", \"@instrumentation.@name\"=\"codex\"})))"}]},
                "plotOptions":{"legend":{"position":"bottom","show":true},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":false,"stacked":false,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            },
            {
              "type":"chart","x":12,"y":19,"width":12,"height":6,
              "properties":{
                "title":"Threads by session source","region":"${MetricsRegion}","view":"pie",
                "data":{"queries":[{"id":"a","type":"cloudwatch-metrics","language":"PromQL","step":60,
                  "query":"sum by (session_source)({\"codex.thread.started\", \"@instrumentation.@name\"=\"codex\"})"}]},
                "plotOptions":{"legend":{"position":"bottom","show":true},"xAxis":{"type":"datetime"},"yAxis":[{"type":"linear"}],
                  "style":{"lineOptions":{"filled":true,"stacked":true,"width":2,"pattern":"solid","spline":false},
                    "numberOptions":{"sparkline":true},"pieOptions":{"innerSize":"50%"},"barOptions":{},"gaugeOptions":{}}}
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: Direct link to the dashboard in CloudWatch.
    Value: !Sub 'https://${MetricsRegion}.console.aws.amazon.com/cloudwatch/home?region=${MetricsRegion}#dashboards/dashboard/${DashboardName}'
